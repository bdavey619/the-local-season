    scene: `It's 6:45 and the parking at Windansea is half-full. Not empty — half-full, which in July would have been a miracle. The water is 70 degrees. The last of the summer crowd left with Labor Day. A man walks down with a longboard under his arm, no wetsuit. A woman sits on the reef rocks with a book she isn't reading. The light is coming in low and amber from the west, and nobody here looks like they drove from somewhere else.`,

        place: "Bird Rock",
        text: "The neighborhood just north of La Jolla that doesn't announce itself. In September the evening walk is unhurried — the coffee shop closes early, someone brings takeout from the taco spot on the corner, dogs are being walked by people who live here. It has the energy of a place that didn't notice the summer.",

    changes: `Around the second day, you stop planning around crowds you're no longer avoiding. The parking lot that said 45 minutes in July takes five minutes now. The restaurant takes you at the time you asked for. You stop making backup plans. This doesn't sound like much until you realize how long it's been since you did that anywhere.`,

    start: `You start staying in the water longer than you planned. You walk neighborhoods instead of landmarks. You eat at the counter. You find yourself at the cliffs at 6:30 for no reason you'd want to explain to someone who hasn't been here in September.`,

    returns: `The feeling that you're somewhere real. Not a version of a place assembled for visitors. The taco shop on the corner is full because it's good, not because it was written up. The beach is warm because the water held its heat, not because it's in season. Nobody is performing San Diego for you. You're just in it.`,
