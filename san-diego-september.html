    scene: `It's 6:45 and the parking at Windansea is half-full. Not empty — just not full enough to change your plans. A man walks down with a longboard and no wetsuit, in shorts that might have been his work clothes an hour ago. Someone is already in the water, not going anywhere in particular. The water is 70 degrees. A woman sits on the reef rocks with a book she isn't reading. The light is coming in low and amber from the west, and nobody here looks like they drove from somewhere else.`,

        text: "The neighborhood just north of La Jolla that doesn't announce itself. In September the evening walk is a decision made at 7pm, not a plan made at 9am — takeout from the taco spot on the corner, dogs, the particular ease of a neighborhood that didn't notice summer was supposed to be different.",

    changes: `You stop checking before you leave. In July you checked the parking, calculated the drive, weighed whether a Wednesday was worth it. In September the lot isn't full enough to change your plans. The drive takes as long as it takes. After work starts feeling like a viable direction rather than a negotiation.`,

    start: `You start getting in even when you only meant to look. You stay longer than you planned because nothing is pushing you out. You let a Wednesday become a beach day without naming it one — you just went after work, and then it was. You stop tracking how much daylight is left.`,
