    // ── The Scene ────────────────────────────────────────────────────
    scene: `It's 7:15 and the trail to Baegundae is already full. Not crowded the way a subway car is crowded — full in the way a room is full when everyone in it knows what they're doing and nobody had to coordinate. A woman in her sixties is moving faster than most of the people below her. Three men who appear to work together are eating kimbap from foil on a boulder, talking quietly enough that the mountain can still be heard. The foliage has reached the mid-slope — not peak, not finished, the particular few days when the mountain can't decide what color it wants. It is a Tuesday.`,

    sceneAnchors: [
      {
        place: "Bukhansan National Park",
        text: "The mountain that sits at the northern edge of Seoul and refuses to let the city pretend it isn't there. In October, the Baegundae trail fills before 8am. You start near Ui Station and walk toward something the city has been organized around since before it was called Seoul.",
      },
      {
        place: "Inwangsan",
        text: "A smaller mountain in the center of the city, walkable from Gyeongbokgung. In October it fills differently — neighborhood regulars, older men who have been climbing this particular trail twice a week for decades, who nod at the same rock formations on the way up and no longer need to look at them.",
      },
      {
        place: "Sanjang (산장)",
        text: "The mountain restaurants that appear halfway down the trail — not at the summit, not at the base. In October they fill from 10am. The menu is fixed: makgeolli, pajeon, sometimes dubu kimchi. You sit on a plastic stool at a folding table and the steam from the jeon goes sideways in the mountain wind.",
      },
    ],

    // ── Sections ─────────────────────────────────────────────────────

    locals: `People leave for the mountain before most of the city is awake. The gear is serious — technical jackets, trekking poles, compression socks — not ironic, not signaling. Functional. They go in groups but move at their own pace. The older hikers pass the younger ones without appearing to notice. By 10am the descent begins and the sanjang fills. People eat makgeolli in a mountain restaurant they have been eating makgeolli in every October. The conversation is easy in the way conversation is easy after something physical has already happened.`,

    localWord: {
      term:          "deungsan",
      pronunciation: "deung-san",
      translation:   "mountain hiking as a civic practice",
      body:          "Not a hobby. A standing appointment. In October you understand the word not by looking it up but by recognizing faces on the way up — the same people, the same trail, the same Tuesday.",
    },

    changes: `The week develops a shape it didn't have. Not the weekend — Tuesday. Someone at work mentions the trail the way they'd mention a coffee place, without offering to explain it or asking if you know it. You find out what they mean by going. What changes is not that you discovered the mountain. It is that Tuesday now has somewhere to go.`,

    start: `Trail shoes end up by the door. You say yes when someone from work mentions the trail after work without asking which one. A week in, you recognize a woman on the descent from two days ago and nod. She nods. Nothing is introduced, nothing is explained. October in Seoul is when the routine starts to include you before you've agreed to it.`,

    stop: `Checking your phone on the descent. The sanjang is where people arrive still breathing hard and sit without organizing the rest of the day. Makgeolli comes. Pajeon comes. Nobody plans the evening from here. The city will be there when you go back to it. The mountain has already handled the afternoon.`,

    returns: `Quiet, briefly. Then a different kind of proximity — to the people moving alongside you, to the city spread below, to your own breathing. Something Seoul's efficiency had been routing around you since you arrived.`,

    remember: `You thought Seoul was its streets. The streets are just how it connects the mountains.`,
